<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello Ammar and Shahzaib</title>
    <style>
      body {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <!-- The greeting is injected here by app.mjs. -->
    <div id="app"></div>

    <script type="module">
      // Browser-ready entry point: import the ES module and render the greeting.
      import { renderGreeting } from "./app.mjs";

      const container = document.getElementById("app");
      container.innerHTML = renderGreeting();
    </script>
  </body>
</html>
